name: Tools Registry Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/tools/**"
      - "src/scripts/syncTools.ts"
      - "src/tools/toolMetadata.ts"
      - "package.json"
      - "package-lock.json"

jobs:
  sync-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync tools to Supabase registry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: npm run tools:sync
